server:
  port: 5273

spring:
  application:
    name: DCForge
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  servlet:
    multipart:
      max-file-size: 10MB      # 单个文件上传大小限制
      max-request-size: 20MB   # 单次请求总大小限制

  datasource:
    url: jdbc:mysql://localhost:3306/dc_forge?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: Dingtong1998
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰映射
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    enabled: true
jwt:
  secret: "E7zckGatiqyT2BSbjNJsLA3xOVdgv8pK91w4hXPWIZfRenmlFD6MHY0ourQCU5"
  expire: 86400000

